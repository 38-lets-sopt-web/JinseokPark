<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- FontAwesome 아이콘 링크 -->
    <script
      src="https://kit.fontawesome.com/81d9463b09.js"
      crossorigin="anonymous"
    ></script>
    <title>1주차 과제에 웹왔니🏡</title>
  </head>
  <body>
    <header>
      <div class="header__profile">
        <img src="assets/images/mini-profile.webp" alt="미니 프로필 사진" />
      </div>
      <div class="header__name">
        <h1>박진석</h1>
        <p>우리집에 웹왔니🏡</p>
      </div>
      <nav class="header__social">
        <a
          href="https://github.com/jin-evergreen"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="깃허브"
        >
          <i class="fa-brands fa-github"></i>
        </a>
        <a
          href="https://www.instagram.com/j_seok1025?igsh=MWg0aHJ2amdvMnBhMg%3D%3D&utm_source=qr"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="인스타그램"
        >
          <i class="fa-brands fa-instagram"></i>
        </a>
      </nav>
    </header>

    <div class="wrapper">
      <aside class="sidebar">
        <nav class="sidebar__nav">
          <ul>
            <li><a href="#gallery">포토덤프</a></li>
            <li><a href="#like">좋아하는 것</a></li>
            <li><a href="#interests">내 관심사</a></li>
            <li><a href="#message">To. 웹왔니</a></li>
          </ul>
        </nav>
      </aside>
      <main>
        <section id="gallery">
          <h2>📸 포토덤프</h2>
          <div class="gallery__grid">
            <div class="gallery__item">
              <img
                src="assets/images/gallery-item1.webp"
                alt="버디버디와 찍은 사진"
              />
            </div>

            <div class="gallery__item">
              <img
                src="assets/images/gallery-item2.webp"
                alt="앰프 팀원 사진"
              />
            </div>

            <div class="gallery__item">
              <img
                src="assets/images/gallery-item3.webp"
                alt="리프레시 데이 사진"
              />
            </div>

            <div class="gallery__item">
              <img
                src="assets/images/gallery-item4.webp"
                alt="1차 세미나 단체 사진"
              />
            </div>

            <div class="gallery__item">
              <img
                src="assets/images/gallery-item5.webp"
                alt="앰프 데모데이 부스 사진"
              />
            </div>

            <div class="gallery__item">
              <img
                src="assets/images/gallery-item6.webp"
                alt="솝커톤 현장 사진"
              />
            </div>
          </div>
        </section>

        <section id="like">
          <h2>🎞️ 좋아하는 것: 음악 듣기</h2>
          <div class="picture-list">
            <div class="picture-group">
              <img src="assets/images/album1.webp" alt="10cm, 4.0 앨범 사진" />
              <img
                src="assets/images/album2.webp"
                alt="오월오일, FRUTO 앨범 사진"
              />
              <img
                src="assets/images/album3.webp"
                alt="잔나비, 환상의 나라 앨범 사진"
              />
              <img
                src="assets/images/album4.webp"
                alt="소란, 괜찮아 앨범 사진"
              />
              <img
                src="assets/images/album5.webp"
                alt="잔나비, 전설 앨범 사진"
              />
              <img src="assets/images/album6.webp" alt="10cm, 5.3 앨범 사진" />
              <img
                src="assets/images/album7.webp"
                alt="소란, Polar 앨범 사진"
              />
            </div>
            <div class="picture-group">
              <img src="assets/images/album1.webp" alt="10cm, 4.0 앨범 사진" />
              <img
                src="assets/images/album2.webp"
                alt="오월오일, FRUTO 앨범 사진"
              />
              <img
                src="assets/images/album3.webp"
                alt="잔나비, 환상의 나라 앨범 사진"
              />
              <img
                src="assets/images/album4.webp"
                alt="소란, 괜찮아 앨범 사진"
              />
              <img
                src="assets/images/album5.webp"
                alt="잔나비, 전설 앨범 사진"
              />
              <img src="assets/images/album6.webp" alt="10cm, 5.3 앨범 사진" />
              <img
                src="assets/images/album7.webp"
                alt="소란, Polar 앨범 사진"
              />
            </div>
          </div>
        </section>

        <section id="interests">
          <h2>💭 내 관심사</h2>
          <div class="interests__grid">
            <div class="interests__card">
              <img src="assets/images/card1.webp" alt="맥도날드, 햄버거 사진" />
              <div class="card__content">
                <h4 class="card__title">🍔 햄버거</h4>
                <div class="card__buttons">
                  <button class="card__button card__button--like">
                    좋아요
                  </button>
                  <button class="card__button card__button--dislike">
                    싫어요
                  </button>
                </div>
              </div>
            </div>
            <div class="interests__card">
              <img src="assets/images/card2.webp" alt="솝트, 38기 로고 사진" />
              <div class="card__content">
                <h4 class="card__title">🏡 웹왔니</h4>
                <div class="card__buttons">
                  <button class="card__button card__button--like">
                    좋아요
                  </button>
                  <button class="card__button card__button--dislike">
                    싫어요
                  </button>
                </div>
              </div>
            </div>
            <div class="interests__card">
              <img src="assets/images/card3.webp" alt="일본, 여행 사진" />
              <div class="card__content">
                <h4 class="card__title">✈️ 여행</h4>
                <div class="card__buttons">
                  <button class="card__button card__button--like">
                    좋아요
                  </button>
                  <button class="card__button card__button--dislike">
                    싫어요
                  </button>
                </div>
              </div>
            </div>
            <div class="interests__card">
              <img src="assets/images/card4.webp" alt="잔나비, 로고 사진" />
              <div class="card__content">
                <h4 class="card__title">🐵 잔나비</h4>
                <div class="card__buttons">
                  <button class="card__button card__button--like">
                    좋아요
                  </button>
                  <button class="card__button card__button--dislike">
                    싫어요
                  </button>
                </div>
              </div>
            </div>
            <div class="interests__card">
              <img src="assets/images/card5.webp" alt="비비큐, 치킨 사진" />
              <div class="card__content">
                <h4 class="card__title">🍗 치킨</h4>
                <div class="card__buttons">
                  <button class="card__button card__button--like">
                    좋아요
                  </button>
                  <button class="card__button card__button--dislike">
                    싫어요
                  </button>
                </div>
              </div>
            </div>
            <div class="interests__card">
              <img src="assets/images/card6.webp" alt="오월오일, 로고 사진" />
              <div class="card__content">
                <h4 class="card__title">🎡 오월오일</h4>
                <div class="card__buttons">
                  <button class="card__button card__button--like">
                    좋아요
                  </button>
                  <button class="card__button card__button--dislike">
                    싫어요
                  </button>
                </div>
              </div>
            </div>
            <div class="interests__card">
              <img src="assets/images/card7.webp" alt="초밥, 10pcs 사진" />
              <div class="card__content">
                <h4 class="card__title">🍣 초밥</h4>
                <div class="card__buttons">
                  <button class="card__button card__button--like">
                    좋아요
                  </button>
                  <button class="card__button card__button--dislike">
                    싫어요
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section id="message">
          <h2>📭 To. 우리집에 웹왔니</h2>
          <div class="message__content">
            <p>웹왔니 여러분 반갑습니다!!!!!!!</p>
            <p>함께 성장하는 웹 파트를 만들어가요!</p>
          </div>
        </section>
      </main>
    </div>
    <footer>읽어주셔서 감사합니다🙇‍♂️</footer>
  </body>
</html>
